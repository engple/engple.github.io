[example]
prompt = """Create English examples using the given <expression>.

1. USE AMERICAN ENGLISH, AUTHENTIC ENGLISH
2. Natural spoken language rather than formal writing.
3. Make variations to make the examples sound natural and realistic.
4. Add an additional sentence before or after the example to provide context if needed.
5. no explanations, just answer.

<example>
For example, for the expression "keep up with",

1. I've been so busy lately, it's hard to keep up with all my emails.
2. Can you slow down a bit? I can't keep up with you.
3. I was running late this morning, so I couldn't keep up with my usual routine.
...
</example>

<expression>
{expression}
</expression>

<count>
The number of examples to generate: {count}
</count>
"""

[translation]
prompt =  """<input>으로 주어지는 예문들을 한국어로 번역

<Instruction>
1. Z세대의 감성, '~해요'체 사용하여 번역
2. 직역을 피하고 일상 대화처럼 자연스러운 표현 사용
3. 원문의 핵심 의미는 유지하면서 자연스러운 한국어로 의역
4. 설명은 생략, 답만 제시
</instruction>

<input>
{input}
</input>"""


[blog_content]
prompt = """주어진 <expression>을 한국어로 설명하는 블로그 콘텐츠를 작성해

<expression>
{expression}
</expression>
"""

[blog_content.title]
description = """A Korean blog title for the English <expression>.
Format: '<K1>' 영어로 어떻게 표현할까 <emoji> - <K2>, <K3> 영어로
- <K1>: Primary Korean meaning of <expression>.
- <K2>, <K3>: Related Korean synonyms of <expression>.
- <emoji>: Emoji relevant to the meanings <K1>, <K2>, and <K3>.
- The English <expression> itself MUST NOT be in the title. Only Korean meanings.

Example for <expression>="honestly":
'솔직히' 영어로 어떻게 표현할까 🤫 - 정직하게, 진심으로 영어로
"""

[blog_content.body]
description = """1. 먼저 <expression>에 대한 한국어 의미를 소개, 그리고 해당 표현의 가진 의미와 뉘앙스를 설명, 간단한 예시 제시
2. Z세대 감성, '~해요'체로 작성
3. <example>의 **길이와 형식**을 지킬것""""
example = """
안녕하세요 👋 '**지연되다**', '연기되다'라는 뜻을 가진 영어 표현을 아시나요? 오늘은 '**delay**'에 대해 이야기해보려고 해요. '**delay**'는 말 그대로 어떤 일이 예정된 시간보다 늦게 일어나거나 진행되는 걸 의미해요. 즉, **시간적으로 미뤄지거나 연기되는 상황**을 표현할 때 자주 쓰여요!

이 단어는 교통, 행사, 약속 등 우리가 일상에서 만날 수 있는 다양한 상황에서 자연스럽게 사용돼요. 예를 들어, 비행기가 기상 악화 때문에 출발 시간이 미뤄질 때 "The flight is delayed due to bad weather."라고 할 수 있어요.

또는, "The meeting has been delayed by an hour tomorrow." 라고 말하면 "내일 회의가 한 시간 지연됐어." 의미에요.

여기서 '**delay**'는 명사와 동사 양쪽으로 사용할 수 있어서 정말 유용하게 쓸 수 있어요! 동사로는 '지연시키다', 명사로는 '지연'이라는 뜻으로 쓰이니 상황에 맞게 활용해 보세요.

## 📖 예문

1. "버스가 10분 지연되고 있어요."

   "The bus is delayed by 10 minutes."

2. "프로젝트가 예상보다 지연되고 있어요."

   "The project is experiencing delays compared to the plan."

---

오늘은 '**지연되다**', '**연기되다**'이라는 뜻을 가진 영어 표현 '**delay**'에 대해 알아봤어요. 혹시 약속이나 일정이 늦어질 때 이 표현을 떠올리면 좋겠죠? 😊

오늘 배운 표현과 예문들을 꼭 최소 3번씩 소리 내서 읽어보세요. 다음에도 더 재미있고 유익한 영어 표현으로 찾아올게요! 감사합니다!"""

