    "'솔선수범하다', '모범이 되다', '행동으로 보여주다'를 영어로 어떻게 표현하면 좋을까요? '선생님은 항상 솔선수범하셔요.', 우리 팀장님은 늘 직접 모범을 보여줘요.' 등을 영어로 표현하는 법을 배워봅시다.",
    "'여분의', '여유있는', '남는'을 영어로 어떻게 표현하면 좋을까요? '펜 남는 거 있나요?', '오늘은 여유 시간이 없어요' 등을 영어로 표현하는 법을 배워봅시다.",
    "'N일 내내', 'N시간 연속으로'를 영어로 어떻게 표현하면 좋을까요? '3시간 내내 공부했어', '일주일 연속으로 비가 왔어' 등을 영어로 표현하는 법을 배워봅시다."
]


[blogmeta.faq]
description = """<expression>을 활용하여 4~5개의 문답을 작성
- 첫번째는 '<expression>'에 대한 한국어 의미를 2~3개를 작성
- 두번째부터는 각 한국어 의미에 대한 표현과 그 예시를 작성해줘
- Z세대 감성, '~해요'체로 작성
- "examples"와 같은 출력 형식을 지킬 것."""
example = [
    [
        "'It's a shame'은 한국어로 어떤 의미인가요?",
        "'It's a shame'은 한국어로 '아쉽다', '안타깝다', '유감이다' 등으로 번역될 수 있습니다. 어떤 일이 일어나지 않았거나 예상과 다르게 진행되어 실망감이나 아쉬움을 표현할 때 사용합니다."
    ],
    [
        "'아쉽다'를 영어로 어떻게 표현할 수 있나요?",
        "'아쉽다'는 상황에 따라 'It's a shame'으로 표현할 수 있습니다. 예를 들어, '네가 파티에 못 온 게 아쉽네'는 'It's a shame you missed the party'로 말할 수 있습니다."
    ],
    [
        "'안타깝다'를 영어로 어떻게 표현할 수 있나요?",
        "'안타깝다'는 상황에 따라 'It's a shame'으로 표현할 수 있습니다. 예를 들어, '그들이 헤어졌다니 정말 안타까워'는 'It's such a shame they broke up'으로 말할 수 있습니다."
    ],
    [
        "'유감이다'를 영어로 어떻게 표현하나요?",
        "'유감이다'는 'It's a shame'으로 표현할 수 있습니다. 예를 들어, '저녁 식사에 갈 수 없어 유감이야'는 'It's a shame we can't make it to dinner'로 표현할 수 있습니다."
    ]
]

